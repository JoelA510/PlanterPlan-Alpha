# repo-context.yaml
# PlanterPlan Task Management System
# Generated from codebase analysis
# Last Updated: 2026-04-17 (Wave 23 — Coach Auto-Assign, Creatorship Audit, Completion-Flag Trigger)
# Specification: spec.md
# Definitive Architecture: docs/architecture/*.md (SINGLE SOURCE OF TRUTH)

project:
  name: planterplan-alpha
  type: react-spa
  stack:
    - react
    - typescript
    - vite
    - tailwindcss
    - supabase
    - react-query
    - dnd-kit

architecture:
  pattern: feature-sliced-design
  layers:
    - src/app (Provider setup, global routing)
    - src/layouts (Dashboard shell, sidebar, mobile FAB)
    - src/pages (Route views orchestrating features)
    - src/features (Business logic domains: auth, dashboard, library, projects, tasks, team)
    - src/shared (UI primitives, API clients, date-engine, tree-helpers)

data_models:
  projects:
    - root_tasks (parent_task_id = null)
    - fields: id, title, target_launch_date, due_soon_days
    - deprecated: location # DO NOT USE
  tasks:
    - nested_items (parent_task_id != null)
    - hierarchy: Phase -> Milestone -> Task -> Subtask
    - strict_constraint: Max Subtask Depth = 1
  team:
    - roles: owner, editor, coach, viewer, limited
    - table: project_members

key_mechanisms:
  data_fetching: "Supabase accessed EXCLUSIVELY via src/shared/api/planterClient.ts + React Query"
  date_cascading: "Autonomous engine in src/shared/lib/date-engine/ dynamically shifts inheritance bounds"
  testing: "Vitest (Unit) + Playwright BDD (Testing/e2e/)"

# ==========================================
# 1. SEMANTIC DEPENDENCY GRAPH
# ==========================================
modules:
  # CORE STATE MANAGEMENT
  TasksDomain:
    purpose: "Manages the hierarchical task list, drag-and-drop, and selection state"
    capabilities:
      - "Recursive rendering via TaskTree -> TaskRow"
      - "Drag-and-drop with cycle detection via @dnd-kit"
      - "Task selection for details panel"
      - "Optimistic updates for mutations"
      - "Data fetching via React Query hooks"
    dependencies:
      strong: [useTaskTree, useTaskTreeDnD, useTaskDetails, useTaskMutations]
      weak: [useProjectSelection]
    exports:
      state:
        - tree: "TaskNode[] - Hierarchical task structure"
        - flatTasks: "Task[] - Flat list of tasks"
        - selectedTaskId: "string | null - Currently selected task"
      actions:
        - onSelectTask: "(taskId) -> void"
        - onToggleExpand: "(taskId) -> void"
        - onMoveTask: "(dragged, target) -> void"
    health:
      change_frequency: moderate
      complexity: "Recursive component structure + DnD logic"
      known_issues:
        - "Large trees may require virtualization (future optimization)"

  AuthContext:
    purpose: "Authentication state and user session management"
    capabilities:
      - "Supabase auth integration"
      - "User profile fetching from users table"
      - "Role-based permission checking (Owner, Editor, Coach, Viewer, Limited)"
      - "Timeout-guarded admin checks"
      - "Wave 22: coach role edits gated to tasks with settings.is_coaching_task = true (RLS policy Enable update for coaches on coaching tasks)"
      - "Wave 23: coaching tasks auto-assigned to the project's sole coach via set_coaching_assignee BEFORE trigger (no-op when zero/multiple coaches or when assignee_id is already set)"
    dependencies:
      strong: [supabaseClient, planterClient]
    exports:
      state:
        - user: "User | null - Current authenticated user"
        - session: "Session | null - Supabase session"
        - isAdmin: "boolean - cached admin status"
      actions:
        - login: "(email, password) -> Promise<void>"
        - logout: "() -> Promise<void>"

  ProjectViewLogic:
    purpose: "Project-level data and state managed via hooks"
    capabilities:
      - "Fetches project details and members"
      - "Manages layout logic (sidebar, details panel)"
    dependencies:
      strong: [
        useProject,
        useProjectMembers,
        useProjectMutations,
        useProjectBoard,
        useProjectReports,
      ]

  # BUSINESS LOGIC HOOKS
  TaskHooks:
    purpose: "Modular task logic"
    modules:
      useTaskTree:
        capabilities: [
          "Fetches tasks",
          "Builds tree structure",
          "Handles skeleton loading",
        ]
        provides: "tree, isLoading, error"
      useTaskTreeDnD:
        capabilities: [
          "Manages drag state",
          "Cycle detection",
          "Optimistic updates",
        ]
        provides: "dndContextProps, overlay, activeId"
      useTaskMutations:
        capabilities: [
          "CRUD operations",
          "Optimistic state updates",
          "Toast notifications",
        ]
        provides: "createTask, updateTask, deleteTask"
      useTaskActions:
        capabilities: [
          "Complex UI orchestration",
          "Drag-and-drop rollbacks",
          "Cache refreshing",
        ]
        provides: "createTaskOrUpdate, deleteTask, updateTask"
      useTaskDetails:
        capabilities: ["Fetches single task details", "Resource management"]
        provides: "task, isLoading, updateTask"
      useCycleDetection:
        capabilities: [
          "Graph traversal to prevent circular parent-child relationships",
        ]
        provides: "validateMove(draggedId, newParentId)"

  LibraryHooks:
    purpose: "Library fetching and state"
    modules:
      useMasterLibrarySearch:
        capabilities:
          - "TanStack useQuery"
          - "Debounced search"
          - "Wave 22: accepts excludeTemplateIds set; exposes exclusionDrained flag for empty-state branching"
      useMasterLibraryTasks:
        capabilities: ["TanStack useInfiniteQuery", "Paginated fetching"]

  # UI COMPONENTS
  TaskComponents:
    purpose: "Atomic task interface"
    components:
      TaskTree:
        capabilities: [
          "Root container",
          "DndContext provider",
          "SortableContext",
        ]
        dependencies: [useTaskTreeDnD]
      TaskRow:
        capabilities: [
          "Recursive rendering",
          "Sortable item",
          "Selection handler",
        ]
        dependencies: [TaskRowUI, TaskActions]
      TaskRowUI:
        capabilities: ["Presentational layer", "Indentation", "Status toggling"]
      TaskActions:
        capabilities: ["Action menu", "Add subtask", "Delete task"]
      TaskDetails:
        capabilities: [
          "Side panel view",
          "Attribute editing",
          "Resource attachment",
        ]
        dependencies: [useTaskDetails]

  # API CLIENT LAYER
  APIClientLayer:
    purpose: "Supabase data access via planterClient adapter"
    modules:
      planterClient:
        capabilities:
          - "Entity CRUD with RLS"
          - "Direct RPC execution"
          - "Optimistic query structures"
          - "Strict mapping to real DB schema columns (no PostgREST aliasing)"
          - "Date math routed through date-engine (ADR-9)"
          - "Typed form payloads via CreateProjectFormData/TaskFormData"
          - "Wave 22: functions.invoke() passthrough for Edge Functions (so UI never touches supabase.functions directly)"
          - "Wave 22: Task.clone stamps settings.spawnedFromTemplate on the cloned root (non-fatal)"
        entities: ["Project", "Task", "TaskRelationship", "TaskResource"]
      sharedConstants:
        capabilities: [
          "ROLES constant (as const)",
          "POSITION_STEP",
          "FSD boundary enforcement (ADR-8)",
        ]
        location: "src/shared/constants/index.ts"

# ==========================================
# 2. BEHAVIOR SPECIFICATIONS
# ==========================================
behaviors:
  TaskDragDrop:
    trigger: "User drags task row"

    drag_start:
      validates: "user.canEdit"
      stores: "activeId in DnD state"
      shows: "DragOverlay with TaskRow clone"

    drag_over:
      calculates: "Potential parent based on indent level (if implemented) or target"

    drop:
      validates: "!detectCycle(activeId, overId)"
      actions:
        - "Optimistic update of tree structure"
        - "API call to update parent_task_id and position"
        - "Toast on error (rollback)"

    cycle_detection:
      logic: "Traverse up from newParentId; if activeId is encountered, block move."

  TaskSelection:
    trigger: "User clicks task title"
    flow:
      - "ProjectView state updates selectedTaskId"
      - "TaskDetails panel slides in/renders"
      - "useTaskDetails fetches full task data (if not in cache)"

  TaskCreation:
    trigger: "User clicks 'Add Task' or 'Add Subtask'"
    flow:
      - "Optimistic addition to list/tree"
      - "API call to create task"
      - "Invalidate queries on success"

# ==========================================
# 3. SYSTEM HEALTH INDICATORS
# ==========================================
health_metrics:
  technical_debt:
    low:
      - "Some legacy CSS classes might remain"
      - "Console logs cleaned up in refactoring"
    medium:
      - "Virtualization needed for 1000+ tasks"

  test_coverage:
    high: [
      "E2E (Golden Path)",
      "Auth Integration",
      "Security Boundary (XSS, RLS, AuthContext fallback)",
    ]
    moderate: ["Task Tree Logic", "DnD Interactions"]

  performance:
    optimizations:
      - "Atomic TaskRow components"
      - "React Query caching (2min staleTime)"
      - "Optimistic updates for DnD"
      - "date-engine consolidation (no raw Date math)"

  wave_status:
    current: "Wave 23 (Coach Auto-Assign, Creatorship Audit, Completion-Flag Trigger)"
    last_completed: "Wave 23"
    spec_version: "1.9.1"
    wave_23_highlights:
      - "Coaching task auto-assignment: BEFORE INSERT/UPDATE trigger set_coaching_assignee on public.tasks auto-sets assignee_id to the project's sole coach when settings.is_coaching_task = true; parent_task_id lookup handles subtask INSERTs where root_id isn't populated yet; zero/multiple coaches or a caller-supplied assignee → no-op"
      - "check_project_ownership rename + audit: new check_project_creatorship(pid, uid) STABLE function holds the correctly-named body; check_project_ownership is a SQL shim delegating to it (audit-only, zero behavior change). Per-policy intent audit on the four project_members RLS policies lives in docs/architecture/auth-rbac.md — shopping list for a follow-up wave's rewrite"
      - "Completion-flag invariant: sync_task_completion_flags BEFORE INSERT/UPDATE trigger on public.tasks unconditionally enforces is_complete === (status === 'completed'). status is the source of truth; inconsistent dual-field writes are reconciled (no trust-caller escape hatch). Task.updateStatus + reconcileAncestors in planterClient now send only status on every server payload; the trigger derives is_complete"
    wave_22_highlights:
      - "supervisor-report Edge Function dispatches via Resend (EMAIL_PROVIDER_API_KEY + RESEND_FROM_ADDRESS); degrades to log-only when either env var is missing or {dry_run:true}"
      - "Task.clone stamps settings.spawnedFromTemplate on the cloned root; Master Library combobox hides already-cloned templates via useMasterLibrarySearch.excludeTemplateIds"
      - "settings.is_coaching_task flag + additive RLS UPDATE policy Enable update for coaches on coaching tasks — project coaches can edit tagged instance rows"
      - "planterClient.functions.invoke() passthrough; EditProjectModal Send test report button scopes runs via {project_id, dry_run:false}"
      - "Shared helpers: tree-helpers.collectSpawnedTemplateIds, coaching-form.{extractCoachingFlag, formDataToCoachingFlag, applyCoachingFlag}"
    wave_21_5_highlights:
      - "Secondary Projects: archive/unarchive toggle on EditProjectModal; ProjectSidebar + ProjectSwitcher filter archived/completed roots with a Show archived toggle"
      - "Task Detail Enhancements: Related Tasks section (useTaskSiblings) and Email details dialog with remembered recipients on user_metadata.saved_email_addresses"
    wave_21_highlights:
